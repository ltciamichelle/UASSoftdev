<!DOCTYPE html>
<html lang="id" style="background-color: #662D91;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventra | Calendar</title>
  <link rel="icon" type="image/png" href="assets/icon.png">
  
  <!-- FullCalendar CSS -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet" />
  
  <link rel="stylesheet" href="css/styles.css?v=9">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  
  <!-- FullCalendar JS -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

  <style>
    /* FullCalendar Customizations */
    .fc-theme-standard .fc-scrollgrid {
      border: none;
    }
    .fc-toolbar-title {
      font-size: 2rem !important;
      font-weight: 800 !important;
      color: var(--primary-dark) !important;
    }
    .fc-button-primary {
      background-color: var(--primary) !important;
      border-color: var(--primary) !important;
      border-radius: 12px !important;
      text-transform: capitalize !important;
      font-weight: 600 !important;
      padding: 8px 16px !important;
    }
    .fc-button-primary:hover {
      background-color: var(--primary-dark) !important;
      border-color: var(--primary-dark) !important;
    }
    .fc-button-active {
      background-color: var(--primary-dark) !important;
      border-color: var(--primary-dark) !important;
    }
    .fc-daygrid-day-number {
      font-weight: 700;
      color: var(--gray-700);
      padding: 8px !important;
    }
    .fc-event {
      border-radius: 8px;
      border: none;
      padding: 4px 8px;
      margin-bottom: 4px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      transition: transform 0.2s;
    }
    .fc-event:hover {
      transform: scale(1.02);
    }
    .fc-day-today {
      background: rgba(102, 45, 145, 0.05) !important;
    }
    
    /* Calendar Wrapper */
    #calendar-wrapper {
      background: white;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.05);
      border: 1px solid var(--gray-200);
    }
    
    /* Modal Styles */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
      z-index: 9999; display: none; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.3s ease; padding: 24px; box-sizing: border-box;
    }
    .modal-overlay.show { opacity: 1; }
    .modal-card {
      background: white; border-radius: 24px; padding: 40px; width: 100%; max-width: 500px;
      position: relative; transform: translateY(20px); transition: transform 0.3s ease;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      max-height: 100%; overflow-y: auto;
    }
    .modal-overlay.show .modal-card { transform: translateY(0); }
    .modal-close {
      position: absolute; top: 24px; right: 24px; background: none; border: none; cursor: pointer; color: var(--gray-400);
    }
    .modal-close:hover { color: var(--gray-900); }
  </style>
</head>
<body>
  <!-- Page Transition Curtains -->
  <div class="curtain curtain-left"></div>
  <div class="curtain curtain-right"></div>
  <img src="assets/logo full.png" alt="Eventra Logo" class="curtain-logo">

  <div class="bg-mesh"></div>

  <header class="header-container">
  <div class="nav-brand-container">
    <a href="index.html" class="nav-brand">
      <img src="assets/logo%20eventra.png?v=2" alt="Eventra" style="width: 220px; height: auto; transform: translateY(4px); filter: brightness(0) invert(1); object-fit: contain;">
    </a>
  </div>

  <!-- Fluid Island Nav -->
  <nav class="fluid-nav">
    <div class="nav-links">
      <a href="search.html" class="nav-link">Discover</a>
      <a href="activity.html" class="nav-link">Activity</a>
      <a href="calendar.html" class="nav-link active">Calendar</a>
    </div>
  </nav>

  <div class="nav-profile-container">
    <a href="profile.html">
      <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&h=100&fit=crop" class="nav-avatar" alt="Profile">
    </a>
  </div>
  </header>

  <main class="container section" style="padding-top: 160px; max-width: 1200px;">
    
    <header class="gsap-reveal" style="margin-bottom: 48px; text-align: center;">
      <span class="eyebrow">Jadwal Pintar</span>
      <h1 style="font-size: clamp(2.5rem, 5vw, 4rem); margin-bottom: 16px;">Kalender Anda.</h1>
      <p style="color: var(--gray-700); font-size: 1.1rem;">Semua event tersimpan rapi di sini.</p>
    </header>

    <div class="gsap-reveal" id="calendar-wrapper">
      <div id="calendar"></div>
    </div>

  </main>

  <!-- Event Detail Modal -->
  <div class="modal-overlay" id="eventModal">
    <div class="modal-card" style="padding: 0; border: 1px solid var(--gray-200); background: var(--white); border-radius: 24px; box-shadow: none;">
      <button class="modal-close" onclick="closeEventModal()" style="background: rgba(0,0,0,0.5); color: white; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; z-index: 10;"><i data-lucide="x"></i></button>
      
      <!-- Image Header -->
      <div id="modalImageContainer" style="height: 200px; width: 100%; background-color: var(--gray-100); background-position: center; background-size: cover; position: relative;">
        <div style="position: absolute; bottom: 0; left: 0; right: 0; height: 100px; background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);"></div>
      </div>
      
      <div style="padding: 32px;">
        <div style="display: flex; gap: 8px; margin-bottom: 12px; margin-top: -16px; position: relative; z-index: 2;" id="modalTags">
          <!-- Tags -->
        </div>
        
        <h2 style="margin-bottom: 24px; font-size: 1.8rem; line-height: 1.2; font-weight: 800; color: var(--gray-900);" id="modalTitle">Judul Event</h2>
        
        <div style="display: flex; flex-direction: column; gap: 16px; margin-bottom: 32px;">
          <!-- Date -->
          <div style="display: flex; gap: 16px; align-items: flex-start; background: var(--bg); padding: 16px; border-radius: 16px; border: 1px solid var(--gray-200);">
            <div style="color: var(--primary);">
              <i data-lucide="calendar"></i>
            </div>
            <div>
              <p style="font-size: 0.85rem; color: var(--gray-500); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Waktu Pelaksanaan</p>
              <p style="font-weight: 700; color: var(--gray-900); font-size: 1.1rem; margin-top: 4px;" id="modalDateTime">10 Jun 2026, 09:00</p>
            </div>
          </div>
          
          <!-- Location -->
          <div style="display: flex; gap: 16px; align-items: flex-start; background: var(--bg); padding: 16px; border-radius: 16px; border: 1px solid var(--gray-200);">
            <div style="color: var(--primary);">
              <i data-lucide="map-pin"></i>
            </div>
            <div>
              <p style="font-size: 0.85rem; color: var(--gray-500); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Lokasi</p>
              <p style="font-weight: 700; color: var(--gray-900); font-size: 1.1rem; margin-top: 4px;" id="modalLocation">Gedung M Universitas Tarumanagara</p>
            </div>
          </div>
        </div>

        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
          <button id="btnDaftarEvent" class="btn btn-primary" style="flex: 1; padding: 14px; font-size: 1rem; border-radius: 16px; display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: none;">
            Daftar Event
          </button>
          <a href="#" target="_blank" id="btnGoogleSync" class="btn btn-secondary" style="flex: 1; padding: 14px; font-size: 1rem; border-radius: 16px; display: flex; justify-content: center; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--gray-200); color: var(--gray-800);">
            <i data-lucide="calendar-plus"></i> Google Calendar
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Registration Modal -->
  <div class="modal-overlay" id="registrationModal">
    <div class="modal-card" style="padding: 0; border: 1px solid var(--gray-200); background: var(--white); border-radius: 24px; box-shadow: none;">
      <button class="modal-close" onclick="closeRegistrationModal()" style="z-index: 10; top: 24px; right: 24px; color: var(--gray-700); background: var(--gray-100); border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;"><i data-lucide="x"></i></button>
      
      <div style="background: var(--primary-lighter); padding: 40px 32px 32px; position: relative; overflow: hidden;">
         <span style="background: var(--primary); padding: 6px 14px; border-radius: 50px; color: white; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; position: relative; z-index: 2;">Pendaftaran Tiket</span>
         <span id="reg_event_price_tag" style="display: none; margin-left: 8px; background: #16A34A; padding: 6px 14px; border-radius: 50px; color: white; font-size: 0.75rem; font-weight: 700; position: relative; z-index: 2;">Rp 0</span>
         <h3 style="color: var(--primary-dark); margin-top: 16px; font-size: 1.8rem; font-weight: 800; line-height: 1.2; position: relative; z-index: 2;" id="reg_event_name">Nama Event</h3>
      </div>
      
      <form id="registrationForm" style="padding: 32px; display: flex; flex-direction: column; gap: 20px;">
        <input type="hidden" id="reg_event_id">
        <div class="input-group" style="display: flex; flex-direction: column; gap: 8px;">
          <label style="font-size: 0.85rem; font-weight: 700; color: var(--gray-700);">Nama Lengkap</label>
          <input type="text" id="reg_nama" required style="width: 100%; padding: 14px 16px; border: 1px solid var(--gray-200); border-radius: 12px; background: var(--bg); font-size: 0.95rem; transition: all 0.3s; outline: none;" onfocus="this.style.borderColor='var(--primary)'; this.style.backgroundColor='#fff';" onblur="this.style.borderColor='var(--gray-200)'; this.style.backgroundColor='var(--bg)';">
        </div>
        <div class="input-group" style="display: flex; flex-direction: column; gap: 8px;">
          <label style="font-size: 0.85rem; font-weight: 700; color: var(--gray-700);">Email Aktif</label>
          <input type="email" id="reg_email" name="email" required style="width: 100%; padding: 14px 16px; border: 1px solid var(--gray-200); border-radius: 12px; background: var(--bg); font-size: 0.95rem; transition: all 0.3s; outline: none;" onfocus="this.style.borderColor='var(--primary)'; this.style.backgroundColor='#fff';" onblur="this.style.borderColor='var(--gray-200)'; this.style.backgroundColor='var(--bg)';">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="input-group" style="display: flex; flex-direction: column; gap: 8px;">
              <label style="font-size: 0.85rem; font-weight: 700; color: var(--gray-700);">No. WhatsApp</label>
              <input type="text" id="reg_wa" name="no_wa" required style="width: 100%; padding: 14px 16px; border: 1px solid var(--gray-200); border-radius: 12px; background: var(--bg); font-size: 0.95rem; transition: all 0.3s; outline: none;" onfocus="this.style.borderColor='var(--primary)'; this.style.backgroundColor='#fff';" onblur="this.style.borderColor='var(--gray-200)'; this.style.backgroundColor='var(--bg)';">
            </div>
            <div class="input-group" style="display: flex; flex-direction: column; gap: 8px;">
              <label style="font-size: 0.85rem; font-weight: 700; color: var(--gray-700);">Instansi / Fakultas</label>
              <input type="text" id="reg_instansi" name="instansi" required style="width: 100%; padding: 14px 16px; border: 1px solid var(--gray-200); border-radius: 12px; background: var(--bg); font-size: 0.95rem; transition: all 0.3s; outline: none;" onfocus="this.style.borderColor='var(--primary)'; this.style.backgroundColor='#fff';" onblur="this.style.borderColor='var(--gray-200)'; this.style.backgroundColor='var(--bg)';">
            </div>
        </div>
        
        <div id="infoRekening" style="display: none;"></div>

        <div class="input-group" id="buktiBayarGroup" style="display: none; flex-direction: column; gap: 8px;">
          <label style="font-size: 0.85rem; font-weight: 700; color: var(--gray-700);">Upload Bukti Pembayaran</label>
          <div style="padding: 16px; border: 2px dashed var(--gray-300); border-radius: 12px; text-align: center; background: var(--gray-50);">
            <input type="file" id="reg_bukti_bayar" name="bukti_bayar" accept="image/*" style="width: 100%; font-size: 0.9rem;">
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="regSubmitBtn" style="margin-top: 12px; padding: 16px; font-size: 1.05rem; font-weight: 700; border-radius: 16px; box-shadow: none; display: flex; justify-content: center; align-items: center; gap: 10px;">
          Konfirmasi Pendaftaran <i data-lucide="check-circle"></i>
        </button>
      </form>
    </div>
  </div>

  <script src="js/api.js?v=5"></script>
  <script src="js/gsap-animations.js?v=4"></script>
  <script>
    lucide.createIcons();
    window.api.updateNavbarAuth();

    function closeEventModal() {
      const modal = document.getElementById('eventModal');
      modal.classList.remove('show');
      setTimeout(() => modal.style.display = 'none', 300);
    }

    function openRegistrationModal(eventId, eventName, tipeTiket = 'Gratis', hargaEvent = 0, bankName = '', bankRekening = '', bankAtasNama = '') {
      const userStr = localStorage.getItem('eventra_user');
      if (!userStr) {
        window.location.href = 'login.html';
        return;
      }
      
      const user = JSON.parse(userStr);
      document.getElementById('reg_event_id').value = eventId;
      document.getElementById('reg_event_name').innerText = eventName;
      document.getElementById('reg_nama').value = user.nama || '';
      document.getElementById('reg_email').value = user.email || '';
      document.getElementById('reg_wa').value = user.phone || '';
      document.getElementById('reg_instansi').value = user.fakultas || user.pekerjaan || '';

      const buktiGroup = document.getElementById('buktiBayarGroup');
      const buktiInput = document.getElementById('reg_bukti_bayar');
      const infoRekening = document.getElementById('infoRekening');

      if (tipeTiket === 'Berbayar') {
        if(buktiGroup) buktiGroup.style.display = 'flex';
        if(buktiInput) buktiInput.required = true;
        const priceTag = document.getElementById('reg_event_price_tag');
        if(priceTag) {
          priceTag.innerText = `Rp ${parseInt(hargaEvent).toLocaleString('id-ID')}`;
          priceTag.style.display = 'inline-block';
        }
        
        if (bankName || bankRekening) {
            if(infoRekening) {
              infoRekening.innerHTML = `
                  <div style="background: rgba(102,45,145,0.05); border: 1px solid var(--primary-lighter); padding: 16px; border-radius: 12px; margin-bottom: 16px;">
                      <p style="font-size: 0.85rem; color: var(--gray-500); margin-bottom: 8px;">Transfer pembayaran ke:</p>
                      <h4 style="color: var(--primary-dark); font-weight: 800; margin-bottom: 4px;">${bankName} - ${bankRekening}</h4>
                      <p style="font-size: 0.9rem; font-weight: 600; color: var(--gray-700);">a.n. ${bankAtasNama}</p>
                  </div>
              `;
              infoRekening.style.display = 'block';
            }
        } else {
            if(infoRekening) infoRekening.style.display = 'none';
        }
      } else {
        if(buktiGroup) buktiGroup.style.display = 'none';
        if(buktiInput) buktiInput.required = false;
        const priceTag = document.getElementById('reg_event_price_tag');
        if(priceTag) priceTag.style.display = 'none';
        if(infoRekening) infoRekening.style.display = 'none';
      }
      
      closeEventModal();
      
      const modal = document.getElementById('registrationModal');
      modal.style.display = 'flex';
      setTimeout(() => modal.classList.add('show'), 10);
    }

    function closeRegistrationModal() {
      const modal = document.getElementById('registrationModal');
      modal.classList.remove('show');
      setTimeout(() => modal.style.display = 'none', 300);
    }

    document.addEventListener('DOMContentLoaded', async function() {
      // Registration form handler
      const regForm = document.getElementById('registrationForm');
      if (regForm) {
        regForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const user = JSON.parse(localStorage.getItem('eventra_user'));
          const btn = document.getElementById('regSubmitBtn');
          const originalText = btn.innerHTML;
          
          btn.innerText = 'Memproses...';
          btn.disabled = true;

          const form = document.getElementById('registrationForm');
          const formData = new FormData(form);
          formData.append('user_id', user.id);

          try {
            const res = await window.api.submitPendaftaran(formData);
            if (res.status === 'success') {
              window.api.showToast('Pendaftaran Berhasil! Silakan cek menu Activity.', 'success');
              closeRegistrationModal();
            } else {
              window.api.showToast(res.message, 'error');
            }
          } catch (err) {
            window.api.showToast('Terjadi kesalahan jaringan atau server: ' + err.message, 'error');
          } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
          }
        });
      }
      // Check login
      const userStr = localStorage.getItem('eventra_user');
      let userObj = null;
      let registeredEventIds = new Set();
      if (!userStr) {
        window.location.href = 'login.html';
        return;
      } else {
        userObj = JSON.parse(userStr);
        const userEvents = await window.api.fetchEventUser(userObj.user_id || userObj.id);
        userEvents.forEach(e => registeredEventIds.add(parseInt(e.id)));
      }

      const calendarEl = document.getElementById('calendar');
      
      // Init Calendar first with empty events
      const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'dayGridMonth,timeGridWeek,listWeek'
        },
        buttonText: {
          today: 'Hari Ini',
          month: 'Bulan',
          week: 'Minggu',
          list: 'Daftar'
        },
        locale: 'id',
        height: 700,
        eventClick: function(info) {
          info.jsEvent.preventDefault();
          const evt = info.event;
          
          document.getElementById('modalTitle').innerText = evt.title;
          
          const startDate = evt.start;
          // Format visually
          const dateStr = startDate.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
          const timeStr = evt.extendedProps.waktu || 'All Day';
          document.getElementById('modalDateTime').innerText = `${dateStr} · ${timeStr}`;
          document.getElementById('modalLocation').innerText = evt.extendedProps.lokasi || 'Tidak ada info lokasi';
          
          // Badge
          let tagsHtml = `<span class="badge badge-primary" style="font-weight: 800;">${evt.extendedProps.kategori || 'Event'}</span>`;
          if(evt.extendedProps.tipe === 'Gratis') {
            tagsHtml += `<span class="badge" style="background:rgba(22, 163, 74, 0.1); color:#16A34A; font-weight: 800;">Gratis</span>`;
          } else {
            tagsHtml += `<span class="badge" style="background:rgba(245, 158, 11, 0.1); color:#D97706; font-weight: 800;">Berbayar</span>`;
          }
          document.getElementById('modalTags').innerHTML = tagsHtml;

          // Image
          const imgContainer = document.getElementById('modalImageContainer');
          if (evt.extendedProps.banner_img) {
            imgContainer.style.backgroundImage = `url('${window.api.BASE_URL}/uploads/${evt.extendedProps.banner_img}')`;
          } else {
            imgContainer.style.backgroundImage = `url('https://images.unsplash.com/photo-1501281668745-f7f57925c3b4?w=800')`;
          }

          // Register Button
          const btnDaftar = document.getElementById('btnDaftarEvent');
          if (registeredEventIds.has(parseInt(evt.id))) {
            btnDaftar.disabled = true;
            btnDaftar.innerHTML = 'Sudah Terdaftar <i data-lucide="check" class="icon-sm"></i>';
            btnDaftar.style.background = 'var(--gray-200)';
            btnDaftar.style.color = 'var(--gray-400)';
            btnDaftar.style.cursor = 'not-allowed';
            btnDaftar.onclick = null;
          } else {
            btnDaftar.disabled = false;
            btnDaftar.innerHTML = 'Daftar Sekarang <i data-lucide="arrow-right" class="icon-sm"></i>';
            btnDaftar.style.background = '';
            btnDaftar.style.color = '';
            btnDaftar.style.cursor = '';
            btnDaftar.onclick = () => {
              openRegistrationModal(evt.id, evt.title, evt.extendedProps.tipe, evt.extendedProps.harga_event || 0, evt.extendedProps.bank_name || '', evt.extendedProps.bank_rekening || '', evt.extendedProps.bank_atas_nama || '');
            };
          }
          lucide.createIcons();

          // Generate Google Calendar Link
          // Format: 20260610T090000Z
          const getGCalDateString = (dateObj, timeStr) => {
            const pad = (n) => n < 10 ? '0'+n : n;
            let d = new Date(dateObj);
            
            // Extract time if exists (HH:MM or HH:MM:SS)
            if(timeStr && timeStr.includes(':')) {
              const parts = timeStr.split(':');
              d.setHours(parseInt(parts[0]), parseInt(parts[1]), 0);
            }
            
            return d.getUTCFullYear() + 
                   pad(d.getUTCMonth()+1) + 
                   pad(d.getUTCDate()) + 'T' + 
                   pad(d.getUTCHours()) + 
                   pad(d.getUTCMinutes()) + 
                   pad(d.getUTCSeconds()) + 'Z';
          };

          const startGCal = getGCalDateString(startDate, evt.extendedProps.waktu);
          // Just add 2 hours for end time as default since we don't have end_time
          let endDate = new Date(startDate);
          if(evt.extendedProps.waktu && evt.extendedProps.waktu.includes(':')) {
             const parts = evt.extendedProps.waktu.split(':');
             endDate.setHours(parseInt(parts[0])+2, parseInt(parts[1]), 0);
          } else {
             endDate.setHours(endDate.getHours() + 2);
          }
          const endGCal = getGCalDateString(endDate, null);

          const gcalUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(evt.title)}&dates=${startGCal}/${endGCal}&details=${encodeURIComponent('Daftar di Eventra: ' + (evt.extendedProps.deskripsi || ''))}&location=${encodeURIComponent(evt.extendedProps.lokasi || '')}`;
          
          document.getElementById('btnGoogleSync').href = gcalUrl;

          // Open Modal
          const modal = document.getElementById('eventModal');
          modal.style.display = 'flex';
          setTimeout(() => modal.classList.add('show'), 10);
        }
      });
      
      calendar.render();

      // Fetch all events from database
      try {
        const eventsRes = await window.api.fetchEvents();
        if(eventsRes && eventsRes.length > 0) {
          const calendarEvents = eventsRes.map(e => {
            // Random color based on category
            const colors = {
              'Seminar': '#662D91',
              'Workshop': '#F59E0B',
              'Lomba': '#10B981',
              'Konser': '#EF4444'
            };
            const color = colors[e.kategori] || '#3B82F6';

            return {
              id: e.id,
              title: e.nama_event,
              start: e.tanggal,
              backgroundColor: color,
              borderColor: color,
              extendedProps: {
                waktu: e.waktu,
                lokasi: e.lokasi,
                kategori: e.kategori,
                tipe: e.tipe_tiket,
                deskripsi: e.deskripsi,
                banner_img: e.banner_img
              }
            };
          });
          
          calendar.addEventSource(calendarEvents);
        }
      } catch (err) {
        console.error("Gagal memuat event untuk kalender:", err);
      }
    });
  </script>

</body>
</html>
