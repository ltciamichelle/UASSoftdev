<!DOCTYPE html>
<html lang="id" style="background-color: #662D91;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventra | Masuk & Daftar</title>
  <link rel="icon" type="image/png" href="assets/icon.png">
  <link rel="stylesheet" href="css/styles.css?v=8">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: transparent; /* Changed from #fafafa to show liquid bg */
      color: var(--text-main);
    }
    .auth-container {
      width: 100%;
      max-width: 600px; /* Lebar card diperbesar untuk versi PC */
      margin: 24px;
      position: relative;
      z-index: 10;
    }
    .auth-tabs {
      display: flex;
      margin-bottom: 32px;
      gap: 16px;
    }
    .auth-tab {
      flex: 1;
      padding: 16px;
      text-align: center;
      font-weight: 800;
      font-size: 1.1rem;
      border-radius: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      background: rgba(0,0,0,0.05);
      color: var(--gray-400);
    }
    .auth-tab.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 10px 20px rgba(102, 45, 145, 0.2);
    }

    .auth-form {
      display: none;
    }
    .auth-form.active {
      display: block;
      animation: fadeIn 0.4s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message-box {
      padding: 16px;
      border-radius: 1rem;
      margin-bottom: 24px;
      display: none;
      font-weight: 600;
      text-align: center;
    }
    .message-box.error { background: #fee2e2; color: #ef4444; display: block; }
    .message-box.success { background: #dcfce7; color: #22c55e; display: block; }

    /* Liquid Motion Background */
    .liquid-bg {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: #ede9fe; /* Very soft light purple base */
      z-index: -2;
      overflow: hidden;
    }
    .blob {
      position: absolute;
      filter: blur(90px);
      z-index: -1;
      opacity: 0.8;
      animation: liquidMotion 15s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
    }
    .blob-1 {
      top: -10%; left: -10%;
      width: 50vw; height: 50vw;
      background: #c4b5fd; /* Soft purple */
      animation-delay: 0s;
    }
    .blob-2 {
      bottom: -20%; right: -10%;
      width: 60vw; height: 60vw;
      background: #a78bfa; /* Slightly deeper soft purple */
      animation-delay: -5s;
      animation-duration: 20s;
    }
    .blob-3 {
      top: 30%; left: 40%;
      width: 45vw; height: 45vw;
      background: #ddd6fe; /* Lighter soft purple */
      animation-delay: -10s;
      animation-duration: 18s;
    }

    @keyframes liquidMotion {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
      33% { transform: translate(8vw, -8vh) scale(1.1) rotate(90deg); border-radius: 60% 40% 30% 70% / 50% 60% 40% 50%; }
      66% { transform: translate(-5vw, 12vh) scale(0.9) rotate(180deg); border-radius: 40% 60% 70% 30% / 60% 40% 50% 70%; }
      100% { transform: translate(0, 0) scale(1) rotate(270deg); border-radius: 70% 30% 50% 50% / 30% 70% 60% 40%; }
    }
  </style>
</head>
<body>
  <!-- Page Transition Curtains -->
  <div class="curtain curtain-left"></div>
  <div class="curtain curtain-right"></div>
  <img src="assets/logo full.png" alt="Eventra Logo" class="curtain-logo">

  <div class="liquid-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="auth-container gsap-reveal">
    <div style="text-align: center; margin-bottom: 40px;">
      <a href="index.html">
        <img src="assets/logo%20full.png?v=2" alt="Eventra" style="width: 260px; height: auto; margin: 0 auto; filter: brightness(0) saturate(100%) invert(19%) sepia(50%) saturate(4649%) hue-rotate(261deg) brightness(88%) contrast(105%) drop-shadow(0 4px 6px rgba(0,0,0,0.1));">
      </a>
    </div>

    <div class="doppelrand-card" style="background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(102, 45, 145, 0.25); border: 1px solid rgba(255, 255, 255, 0.6);">
      <div class="card-inner" style="padding: 40px;">
        
        <div id="msgBox" class="message-box"></div>

        <div class="auth-tabs">
          <div class="auth-tab active" onclick="switchTab('login')">Masuk</div>
          <div class="auth-tab" onclick="switchTab('register')">Daftar</div>
        </div>

        <!-- FORM LOGIN -->
        <form id="loginForm" class="auth-form active">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="logEmail" class="form-control" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="logPassword" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; padding: 16px; font-size: 1.1rem; margin-top: 16px;">
            Masuk ke Eventra
          </button>
        </form>

        <!-- FORM REGISTER -->
        <form id="registerForm" class="auth-form">
          <div class="form-group">
            <label>Pilih Peran</label>
            <select class="form-control" id="regRole" onchange="toggleRoleFields(this.value)" required>
              <option value="mahasiswa">Mahasiswa</option>
              <option value="non_mahasiswa">Non Mahasiswa</option>
            </select>
          </div>
          
          <div style="display: grid; grid-template-columns: 1fr; gap: 16px;">
            <div class="form-group">
              <label>Nama Lengkap</label>
              <input type="text" id="regNama" class="form-control" required>
            </div>
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="regEmail" class="form-control" required>
            </div>
            <div class="form-group">
              <label>No. WhatsApp</label>
              <input type="text" id="regPhone" class="form-control" required>
            </div>
          </div>

          <div class="form-group">
            <label>Password</label>
            <input type="password" id="regPassword" class="form-control" required>
          </div>

          <!-- Dynamic Fields based on Role -->
          <div id="dynamicFields">
            <!-- Mahasiswa Default -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
              <div class="form-group"><label>NIM</label><input type="text" id="regNim" class="form-control"></div>
              <div class="form-group"><label>Fakultas</label><input type="text" id="regFakultas" class="form-control"></div>
            </div>
            <div class="form-group"><label>Program Studi</label><input type="text" id="regProdi" class="form-control"></div>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; padding: 16px; font-size: 1.1rem; margin-top: 16px;">
            Daftar Akun Baru
          </button>
        </form>

      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/gsap-animations.js?v=3"></script>
  <script>
    lucide.createIcons();

    // Pastikan tidak masuk jika sudah login
    if(localStorage.getItem('eventra_user')) {
      window.location.href = 'index.html';
    }

    const msgBox = document.getElementById('msgBox');

    function showMsg(text, type) {
      msgBox.className = `message-box ${type}`;
      msgBox.innerText = text;
    }

    // Toggle Tabs
    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      msgBox.className = 'message-box'; // Hide msg

      if(tab === 'login') {
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
        document.getElementById('loginForm').classList.add('active');
      } else {
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
        document.getElementById('registerForm').classList.add('active');
      }
    }



    // Toggle dynamic fields for Register
    function toggleRoleFields(role) {
      const container = document.getElementById('dynamicFields');
      if (role === 'mahasiswa') {
        container.innerHTML = `
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div class="form-group"><label>NIM</label><input type="text" id="regNim" class="form-control" required></div>
            <div class="form-group"><label>Fakultas</label><input type="text" id="regFakultas" class="form-control" required></div>
          </div>
          <div class="form-group"><label>Program Studi</label><input type="text" id="regProdi" class="form-control" required></div>
        `;
      } else {
        container.innerHTML = `
          <div class="form-group"><label>Pekerjaan / Instansi</label><input type="text" id="regPekerjaan" class="form-control" required></div>
        `;
      }
    }

    // Handle Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const data = {
        email: document.getElementById('logEmail').value,
        password: document.getElementById('logPassword').value
      };

      try {
        const res = await window.api.loginUser(data);
        if(res.status === 'success') {
          showMsg(res.message, 'success');
          localStorage.setItem('eventra_user', JSON.stringify(res.data));
          setTimeout(() => { window.location.href = 'index.html'; }, 1000);
        } else {
          showMsg(res.message, 'error');
        }
      } catch (err) {
        showMsg('Gagal terhubung ke server', 'error');
      }
    });

    // Handle Register
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const role = document.getElementById('regRole').value;
      const data = {
        role: role,
        nama: document.getElementById('regNama').value,
        email: document.getElementById('regEmail').value,
        no_hp: document.getElementById('regPhone').value,
        password: document.getElementById('regPassword').value
      };

      if(role === 'mahasiswa') {
        data.nim = document.getElementById('regNim').value;
        data.fakultas = document.getElementById('regFakultas').value;
        data.prodi = document.getElementById('regProdi').value;
      } else {
        data.pekerjaan = document.getElementById('regPekerjaan').value;
      }

      try {
        const res = await window.api.registerUser(data);
        if(res.status === 'success') {
          showMsg(res.message, 'success');
          document.getElementById('registerForm').reset();
        } else {
          showMsg(res.message, 'error');
        }
      } catch (err) {
        showMsg('Gagal terhubung ke server', 'error');
      }
    });

  </script>

</body>
</html>
