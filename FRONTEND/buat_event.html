<!DOCTYPE html>
<html lang="id" style="background-color: #662D91;">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventra | Buat Event</title>
  <link rel="icon" type="image/png" href="assets/icon.png">
  <link rel="stylesheet" href="css/styles.css?v=1781334578">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <!-- Flatpickr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script>
    // Security check before page fully loads to prevent flashing
    const user = JSON.parse(localStorage.getItem('eventra_user'));
    if (!user) {
      window.api.showToast("Anda harus login terlebih dahulu untuk membuat event!", 'error');
      window.location.href = 'login.html';
    }
  </script>
  <style>
    .form-group {
      margin-bottom: 24px;
    }
    .form-label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--primary-dark);
    }
    .form-control {
      width: 100%;
      padding: 16px 24px;
      font-size: 1rem;
      border-radius: 12px;
      border: 1px solid var(--gray-200);
      background: rgba(255,255,255,0.7);
      transition: all 0.3s ease;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(102, 45, 145, 0.1);
      background: #fff;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }
    
    .image-upload-wrapper {
      position: relative;
      width: 100%;
      height: 200px;
      border: 2px dashed var(--primary);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      background: rgba(102, 45, 145, 0.05);
      transition: all 0.3s ease;
    }
    .image-upload-wrapper input[type="file"] {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0;
      cursor: pointer;
      z-index: 10;
    }
    #imagePreview {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover;
      display: none;
      z-index: 5;
    }
  </style>
</head>
<body>
  <!-- Page Transition Curtains -->
  <div class="curtain curtain-left"></div>
  <div class="curtain curtain-right"></div>
  <img src="assets/logo full.png" alt="Eventra Logo" class="curtain-logo">
  <!-- Soft Ambient Background -->
  <div class="ambient-bg"></div>

  <!-- Full-Width Navbar -->
  <header class="header-container">
  <div class="nav-brand-container">
    <a href="index.html" class="nav-brand">
      <img src="assets/logo%20full.png?v=2" alt="Eventra" style="width: 220px; height: auto; filter: brightness(0) invert(1); object-fit: contain;">
    </a>
  </div>

  <!-- Fluid Island Nav -->
  <nav class="fluid-nav">
    <div class="nav-links">
      <a href="search.html" class="nav-link"><i data-lucide="compass" class="nav-icon"></i><span>Discover</span></a>
      <a href="activity.html" class="nav-link"><i data-lucide="activity" class="nav-icon"></i><span>Activity</span></a>
      <a href="calendar.html" class="nav-link"><i data-lucide="calendar" class="nav-icon"></i><span>Calendar</span></a>
    </div>
  </nav>

  <div class="nav-profile-container">
    <a href="profile.html">
      <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&h=100&fit=crop" class="nav-avatar"
        alt="Profile">
    </a>
  </div>
  </header>

  <main class="container section" style="padding-top: 100px;">
    <div style="max-width: 800px; margin: 0 auto;">
      <div class="header-banner" style="text-align: center; margin-bottom: 40px;">
        <h1 style="font-size: 2.5rem; font-weight: 900; margin-bottom: 16px; color: var(--primary-dark);" id="pageTitle">Buat Event Baru</h1>
        <p style="font-size: 1.1rem; color: var(--gray-600); max-width: 600px; margin: 0 auto;" id="pageSubtitle">Wujudkan ide cemerlang Anda menjadi event spektakuler. Isi detail event Anda di bawah ini.</p>
      </div>
      <div class="doppelrand-card gsap-reveal" style="padding: 40px !important;">
        <form id="buatEventForm">
          
          <!-- Image Upload -->
          <div class="form-group">
            <label class="form-label">Banner Event</label>
            <div class="image-upload-wrapper" id="uploadWrapper">
              <i data-lucide="image" class="upload-icon" style="width: 48px; height: 48px; color: var(--primary); margin-bottom: 16px; position: relative; z-index: 1; transition: opacity 0.3s;"></i>
              <span class="upload-text-1" style="font-weight: 700; color: var(--primary-dark); position: relative; z-index: 1; transition: opacity 0.3s;">Klik atau seret untuk mengunggah banner</span>
              <span class="upload-text-2" style="font-size: 0.85rem; color: var(--gray-500); margin-top: 8px; position: relative; z-index: 1; transition: opacity 0.3s;">Format JPG, PNG (Maks. 2MB)</span>
              <img id="imagePreview" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 5; display: none; border-radius: 14px; background-color: var(--white);" alt="Preview Banner">
              <input type="file" id="banner_img" name="Poster_Event" accept="image/*" required style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10;">
            </div>
            <p id="fileNameDisplay" style="text-align: center; font-size: 0.9rem; color: var(--primary-dark); margin-top: 12px; font-weight: 700; min-height: 20px;"></p>
          </div>

          <div class="form-group">
            <label class="form-label">Nama Event</label>
            <input type="text" class="form-control" name="Nama_Event" placeholder="Cth: Seminar Nasional Teknologi 2026" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Kategori</label>
              <select class="form-control" name="Id_Kategori" required>
                <option value="" disabled selected>Pilih Kategori</option>
                <option value="1">Akademik</option>
                <option value="2">Olahraga</option>
                <option value="3">Seni & Budaya</option>
                <option value="4">Seminar</option>
                <option value="5">Hiburan</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Lokasi</label>
              <input type="text" class="form-control" name="Lokasi" placeholder="Cth: Auditorium Utama" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Tanggal Event</label>
              <input type="date" class="form-control" name="Tanggal_Event" required>
            </div>
            <div class="form-group">
              <label class="form-label">Deskripsi Event</label>
              <textarea class="form-control" name="Deskripsi" rows="3" placeholder="Jelaskan detail acara Anda di sini..."></textarea>
            </div>
          </div>



          <div style="text-align: right; margin-top: 32px;">
            <button type="submit" class="btn btn-primary" id="submitBtn">Publikasikan Event</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer style="background: var(--white); padding: 64px 0; border-top: 1px solid var(--gray-200); text-align: center; position: relative; z-index: 10;">
    <img src="assets/logo eventra.png" alt="Eventra" style="width: 150px; opacity: 0.5; margin-bottom: 24px; filter: grayscale(100%);">
    <p style="color: var(--gray-400); font-size: 0.9rem;">© 2026 Eventra by BEM FTI UNTAR. All rights reserved.</p>
  </footer>

  <script src="js/api.js?v=1781334578"></script>
  <script src="js/gsap-animations.js?v=1781334578"></script>
  
  <!-- Image Preview & Submit Logic -->
  <script>
    // Update Navbar Auth state
    window.api.updateNavbarAuth();

    // Initialize Flatpickr for Date and Time Inputs
    flatpickr("input[type='date']", {
      dateFormat: "Y-m-d",
      allowInput: true
    });
    
    flatpickr("input[type='time']", {
      enableTime: true,
      noCalendar: true,
      dateFormat: "H:i",
      time_24hr: true,
      allowInput: true
    });

    // Banner Upload Logic
    const uploadWrapper = document.getElementById('uploadWrapper');
    const bannerInput = document.getElementById('banner_img');
    const imagePreview = document.getElementById('imagePreview');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    
    uploadWrapper.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadWrapper.style.borderColor = 'var(--primary-dark)';
      uploadWrapper.style.background = 'rgba(102, 45, 145, 0.15)';
    });
    
    uploadWrapper.addEventListener('dragleave', (e) => {
      e.preventDefault();
      uploadWrapper.style.borderColor = 'var(--primary)';
      uploadWrapper.style.background = 'rgba(102, 45, 145, 0.05)';
    });
    
    uploadWrapper.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadWrapper.style.borderColor = 'var(--primary)';
      uploadWrapper.style.background = 'rgba(102, 45, 145, 0.05)';
      if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
        bannerInput.files = e.dataTransfer.files;
        handleFileSelect();
      }
    });

    bannerInput.addEventListener('change', handleFileSelect);

    function handleFileSelect() {
      const icon = uploadWrapper.querySelector('.upload-icon');
      const text1 = uploadWrapper.querySelector('.upload-text-1');
      const text2 = uploadWrapper.querySelector('.upload-text-2');

      if (bannerInput.files && bannerInput.files[0]) {
        const file = bannerInput.files[0];
        fileNameDisplay.textContent = "File: " + file.name;
        
        if (icon) icon.style.opacity = '0';
        if (text1) text1.style.opacity = '0';
        if (text2) text2.style.opacity = '0';
        
        const reader = new FileReader();
        reader.onload = function(e) {
          imagePreview.src = e.target.result;
          imagePreview.style.display = 'block';
        }
        reader.readAsDataURL(file);
      } else {
        fileNameDisplay.textContent = "";
        imagePreview.style.display = 'none';
        imagePreview.src = '';
        if (icon) icon.style.opacity = '1';
        if (text1) text1.style.opacity = '1';
        if (text2) text2.style.opacity = '1';
      }
    }



    // Form Submission
    const form = document.getElementById('buatEventForm');
    const submitBtn = document.getElementById('submitBtn');

    // Edit Mode Logic
    const urlParams = new URLSearchParams(window.location.search);
    const editId = urlParams.get('edit_id');
    let isEditMode = false;

    if (editId) {
        isEditMode = true;
        document.getElementById('pageTitle').innerText = 'Edit Event';
        document.getElementById('pageSubtitle').innerText = 'Perbarui informasi event Anda agar tetap akurat.';
        submitBtn.innerText = 'Simpan Perubahan';
        
        // Add hidden input for event_id
        const hiddenIdInput = document.createElement('input');
        hiddenIdInput.type = 'hidden';
        hiddenIdInput.name = 'event_id_primary';
        hiddenIdInput.value = editId;
        form.appendChild(hiddenIdInput);

        // Fetch Event Data
        async function loadEventData() {
            const data = await window.api.getEventById(editId);
            if (data.status === 'success') {
                const ev = data.data;
                // Check authorization
                const user = JSON.parse(localStorage.getItem('eventra_user'));
                if(parseInt(ev.Id_User) !== parseInt(user.Id_User)) {
                    window.api.showToast('Akses ditolak. Anda bukan pemilik event ini.', 'error');
                    setTimeout(() => window.location.href = 'profile.html', 1500);
                    return;
                }

                form.Nama_Event.value = ev.Nama_Event;
                form.Id_Kategori.value = ev.Id_Kategori;
                form.Lokasi.value = ev.Lokasi;
                form.Tanggal_Event.value = ev.Tanggal_Event;
                form.Deskripsi.value = ev.Deskripsi || '';

                if (ev.Poster_Event) {
                    imagePreview.src = `${window.api.BASE_URL}/uploads/${ev.Poster_Event}`;
                    imagePreview.style.display = 'block';
                    document.getElementById('banner_img').required = false; 
                    
                    const icon = uploadWrapper.querySelector('.upload-icon');
                    const text1 = uploadWrapper.querySelector('.upload-text-1');
                    const text2 = uploadWrapper.querySelector('.upload-text-2');
                    if (icon) icon.style.opacity = '0';
                    if (text1) text1.style.opacity = '0';
                    if (text2) text2.style.opacity = '0';
                    fileNameDisplay.textContent = "Gambar saat ini: " + ev.Poster_Event;
                }
            } else {
                window.api.showToast(data.message, 'error');
            }
        }
        loadEventData();
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const user = JSON.parse(localStorage.getItem('eventra_user'));
      if (!user) {
        window.api.showToast('Sesi Anda telah habis. Silakan login kembali.', 'error');
        window.location.href = 'login.html';
        return;
      }



      // Setup loading state
      const originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = 'Memproses...';
      submitBtn.disabled = true;

      try {
        const formData = new FormData(form);
        formData.append('Id_User', user.Id_User || user.id); 
        if (isEditMode) {
            formData.append('Id_Event', editId);
        }

        const actionUrl = isEditMode 
            ? `${window.api.BASE_URL}/Event.php?aksi=update_event` 
            : `${window.api.BASE_URL}/Event.php?aksi=tambah_event`;

        const response = await fetch(actionUrl, {
          method: 'POST',
          body: formData
        });

        const rawText = await response.text();
        let result;
        try {
            result = JSON.parse(rawText);
        } catch (err) {
            console.error("RAW RESPONSE:", rawText);
            throw new Error("Server Error: " + rawText.substring(0, 100));
        }
        
        if (result.status === 'success') {
          // Success animation then redirect
          gsap.to('.doppelrand-card', {
            y: -20, opacity: 0, duration: 0.5, onComplete: () => {
              window.api.showToast('Berhasil: ' + result.message, 'success');
              window.location.href = 'activity.html'; // Redirect to Activity so they can see their events (if they are organizer)
            }
          });
        } else {
          window.api.showToast('Gagal: ' + result.message, 'error');
          submitBtn.innerHTML = originalText;
          submitBtn.disabled = false;
        }

      } catch (error) {
        console.error('Error submitting form:', error);
        window.api.showToast(error.message || 'Terjadi kesalahan jaringan atau server. Pastikan backend berjalan.', 'error');
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
      }
    });
  </script>

</body>
</html>
