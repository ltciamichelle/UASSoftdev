<!DOCTYPE html>
<html lang="id" style="background-color: #662D91;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventra | Discover</title>
  <link rel="icon" type="image/png" href="assets/icon.png">
  <link rel="stylesheet" href="css/styles.css?v=8">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <style>
    .search-input-wrapper {
      position: relative;
      margin-bottom: 48px;
    }
    .search-input {
      width: 100%;
      padding: 24px 24px 24px 72px;
      font-size: 1.5rem;
      font-weight: 800;
      border-radius: 2rem;
      border: 1px solid var(--gray-200);
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(16px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.05);
      transition: all 0.4s var(--ease-spring);
    }
    .search-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 20px 40px rgba(102, 45, 145, 0.15);
      background: #fff;
    }
    .search-icon {
      position: absolute;
      left: 28px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--primary);
    }
    .filter-group {
      margin-bottom: 24px;
    }
    .filter-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      color: var(--gray-700);
      cursor: pointer;
      font-weight: 600;
      transition: color 0.2s;
    }
    .filter-option:hover {
      color: var(--primary);
    }
    .filter-option input {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }
    
    /* Layout Upgrades */
    .editorial-split {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 120px;
      align-items: flex-start;
    }
    .editorial-list {
      display: flex;
      flex-direction: column;
      gap: 32px; /* Clean spacing, no negative margins */
    }
    .list-card {
      transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1), box-shadow 0.4s;
    }
    .list-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    }
    @media (max-width: 900px) {
      .editorial-split { grid-template-columns: 1fr; gap: 32px; }
      .list-card:hover { transform: translateY(-4px); }
      .sidebar-filters { position: relative !important; top: 0 !important; margin-bottom: 32px; }
    }
  </style>
</head>
<body>
  <!-- Page Transition Curtains -->
  <div class="curtain curtain-left"></div>
  <div class="curtain curtain-right"></div>
  <img src="assets/logo full.png" alt="Eventra Logo" class="curtain-logo">

  <div class="bg-mesh"></div>

  <header class="header-container">
  <div class="nav-brand-container">
    <a href="index.html" class="nav-brand">
      <img src="assets/logo%20eventra.png?v=2" alt="Eventra" style="width: 220px; height: auto; transform: translateY(4px); filter: brightness(0) invert(1); object-fit: contain;">
    </a>
  </div>

  <!-- Fluid Island Nav -->
  <nav class="fluid-nav">
    <div class="nav-links">
      <a href="search.html" class="nav-link active">Discover</a>
      <a href="activity.html" class="nav-link">Activity</a>
      <a href="calendar.html" class="nav-link">Calendar</a>
    </div>
  </nav>

  <div class="nav-profile-container">
    <a href="profile.html">
      <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&h=100&fit=crop" class="nav-avatar"
        alt="Profile">
    </a>
  </div>
  </header>

  <main class="container section" style="padding-top: 160px;">
    
    <div class="search-input-wrapper gsap-reveal">
      <i data-lucide="search" class="search-icon icon-md"></i>
      <input type="text" class="search-input" placeholder="Cari event, topik, atau penyelenggara...">
    </div>

    <div class="editorial-split">
      
      <!-- Left: Massive Typography & Filters -->
      <aside class="sidebar-filters gsap-reveal" style="position: sticky; top: 120px;">
        <span class="eyebrow">Explore Directory</span>
        <h1 style="margin-bottom: 48px; font-size: clamp(3.5rem, 6vw, 6rem);">Temukan<br>Event<br>Terbaik.</h1>
        
        <div class="doppelrand-card">
          <div class="card-inner" style="padding: 32px;">
            <div class="filter-group">
              <h4 style="margin-bottom: 16px;">Kategori</h4>
              <label class="filter-option"><input type="checkbox" checked> Semua</label>
              <label class="filter-option"><input type="checkbox"> Seminar</label>
              <label class="filter-option"><input type="checkbox"> Workshop</label>
              <label class="filter-option"><input type="checkbox"> Lomba</label>
            </div>
            
            <div class="filter-group">
              <h4 style="margin-bottom: 16px;">Biaya</h4>
              <label class="filter-option"><input type="radio" name="fee" checked> Semua</label>
              <label class="filter-option"><input type="radio" name="fee"> Gratis</label>
              <label class="filter-option"><input type="radio" name="fee"> Berbayar</label>
            </div>
          </div>
        </div>
      </aside>

      <!-- Right: Editorial List Results -->
      <div class="editorial-list" id="events-container">
        <!-- Events will be loaded dynamically here by JS -->
        <div style="text-align: center; padding: 64px; color: var(--gray-400);">
          <i data-lucide="loader" class="icon-md" style="animation: spin 2s linear infinite;"></i>
          <p style="margin-top: 16px;">Memuat event...</p>
        </div>
      </div>
    </div>
    
    <!-- Pagination Removed -->  </main>

  <script src="js/api.js?v=4"></script>
  <script src="js/gsap-animations.js?v=3"></script>
  <script>
    lucide.createIcons();
    window.api.updateNavbarAuth();

    // Render Events Dynamically
    document.addEventListener("DOMContentLoaded", async () => {
      const container = document.getElementById('events-container');
      const events = await window.api.fetchEvents();

      const userStr = localStorage.getItem('eventra_user');
      let registeredEventIds = new Set();
      if (userStr) {
        const userObj = JSON.parse(userStr);
        const userEvents = await window.api.fetchEventUser(userObj.user_id || userObj.id);
        userEvents.forEach(e => registeredEventIds.add(parseInt(e.id)));
      }

      if (events.length === 0) {
        container.innerHTML = `
          <div class="doppelrand-card list-card" style="text-align:center; padding: 64px;">
            <p style="font-size: 1.2rem; color: var(--gray-700);">Belum ada event yang dipublikasikan saat ini.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = ''; // Clear loader
      
      events.forEach((event, index) => {
        // Build image URL
        const imageUrl = event.banner_img 
            ? `${window.api.BASE_URL}/uploads/${event.banner_img}` 
            : 'https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=600';

        // Check if ticket is free
        let ticketDisplay = event.tipe_tiket === 'Gratis' 
            ? '<span style="font-weight: 900; color: var(--primary-dark); font-size: 1.2rem;">Gratis</span>'
            : `<span style="font-weight: 900; color: var(--gray-900); font-size: 1.2rem;">${event.tipe_tiket}</span>`;

        const article = document.createElement('article');
        article.className = 'doppelrand-card list-card';
        if (index === events.length - 1) article.style.marginBottom = '0';

        article.innerHTML = `
          <div class="card-inner">
            <div style="height: 240px; background: url('${imageUrl}') center/cover;"></div>
            <div style="padding: 32px; flex: 1; display: flex; flex-direction: column;">
              <h3 style="margin-bottom: 8px;">${event.nama_event}</h3>
              <p style="font-size: 1rem; color: var(--gray-400); margin-bottom: 24px; display: flex; align-items: center; gap: 8px;">
                <i data-lucide="calendar" class="icon-sm"></i> ${window.api.formatTanggal(event.tanggal)}
                <i data-lucide="map-pin" class="icon-sm" style="margin-left: 16px;"></i> ${event.lokasi}
              </p>
              <div style="margin-top: auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
                <div style="display: flex; gap: 16px; align-items: center;">
                  <span class="badge badge-primary">${event.kategori}</span>
                  ${ticketDisplay}
                </div>
                ${registeredEventIds.has(parseInt(event.id))
                  ? `<button class="btn" disabled style="padding: 10px 20px; font-size: 0.9rem; background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; border: none;">Sudah Terdaftar <i data-lucide="check" class="icon-sm"></i></button>`
                  : `<button class="btn btn-primary" onclick="openRegistrationModal(${event.id}, '${event.nama_event.replace(/'/g, "\\'").replace(/"/g, "&quot;")}', '${event.tipe_tiket}', ${event.harga_event || 0}, '${event.bank_name || ''}', '${event.bank_rekening || ''}', '${event.bank_atas_nama || ''}')" style="padding: 10px 20px; font-size: 0.9rem;">Daftar <i data-lucide="arrow-right" class="icon-sm"></i></button>`
                }
              </div>
            </div>
          </div>
        `;
        container.appendChild(article);
      });

      // Refresh Lucide Icons for dynamically added content
      lucide.createIcons();
      
      // Manually animate dynamic elements since gsap-animations.js already ran
      if (typeof gsap !== 'undefined') {
        gsap.fromTo(container.children, 
          { y: 50, opacity: 0, filter: "blur(10px)" }, 
          { y: 0, opacity: 1, filter: "blur(0px)", duration: 1.2, stagger: 0.15, ease: "power3.out" }
        );
      }

      // Refresh GSAP ScrollTrigger
      if (typeof ScrollTrigger !== 'undefined') {
        ScrollTrigger.refresh();
      }
    });

    // Registration Modal Logic
    function openRegistrationModal(eventId, eventName, tipeTiket = 'Gratis', hargaEvent = 0, bankName = '', bankRekening = '', bankAtasNama = '') {
      const userStr = localStorage.getItem('eventra_user');
      if (!userStr) {
        window.location.href = 'login.html';
        return;
      }
      
      const user = JSON.parse(userStr);
      document.getElementById('reg_event_id').value = eventId;
      document.getElementById('reg_event_name').innerText = eventName;
      document.getElementById('reg_nama').value = user.nama || '';
      document.getElementById('reg_email').value = user.email || '';
      document.getElementById('reg_wa').value = user.phone || '';
      document.getElementById('reg_instansi').value = user.fakultas || user.pekerjaan || '';
      
      const buktiGroup = document.getElementById('buktiBayarGroup');
      const buktiInput = document.getElementById('reg_bukti_bayar');
      const infoRekening = document.getElementById('infoRekening');

      if (tipeTiket === 'Berbayar') {
        if(buktiGroup) buktiGroup.style.display = 'flex';
        if(buktiInput) buktiInput.required = true;
        const priceTag = document.getElementById('reg_event_price_tag');
        if(priceTag) {
          priceTag.innerText = `Rp ${parseInt(hargaEvent).toLocaleString('id-ID')}`;
          priceTag.style.display = 'inline-block';
        }
        
        if (bankName || bankRekening) {
            if(infoRekening) {
              infoRekening.innerHTML = `
                  <div style="background: rgba(102,45,145,0.05); border: 1px solid var(--primary-lighter); padding: 16px; border-radius: 12px; margin-bottom: 16px;">
                      <p style="font-size: 0.85rem; color: var(--gray-500); margin-bottom: 8px;">Transfer pembayaran ke:</p>
                      <h4 style="color: var(--primary-dark); font-weight: 800; margin-bottom: 4px;">${bankName} - ${bankRekening}</h4>
                      <p style="font-size: 0.9rem; font-weight: 600; color: var(--gray-700);">a.n. ${bankAtasNama}</p>
                  </div>
              `;
              infoRekening.style.display = 'block';
            }
        } else {
            if(infoRekening) infoRekening.style.display = 'none';
        }
      } else {
        if(buktiGroup) buktiGroup.style.display = 'none';
        if(buktiInput) buktiInput.required = false;
        const priceTag = document.getElementById('reg_event_price_tag');
        if(priceTag) priceTag.style.display = 'none';
        if(infoRekening) infoRekening.style.display = 'none';
      }

      const modal = document.getElementById('registrationModal');
      modal.style.display = 'flex';
      setTimeout(() => modal.classList.add('show'), 10);

      // Increment View Event
      window.api.incrementEventView(eventId);
    }

    function closeRegistrationModal() {
      const modal = document.getElementById('registrationModal');
      modal.classList.remove('show');
      setTimeout(() => modal.style.display = 'none', 300);
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('registrationForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const user = JSON.parse(localStorage.getItem('eventra_user'));
        const btn = document.getElementById('regSubmitBtn');
        const originalText = btn.innerText;
        
        btn.innerText = 'Memproses...';
        btn.disabled = true;

        const form = document.getElementById('registrationForm');
        const formData = new FormData(form);
        formData.append('user_id', user.user_id);

        try {
          const res = await window.api.submitPendaftaran(formData);
          if (res.status === 'success') {
            window.api.showToast('Pendaftaran Berhasil! Silakan cek menu Activity.', 'success');
            closeRegistrationModal();
          } else {
            window.api.showToast(res.message, 'error');
          }
        } catch (err) {
          window.api.showToast('Terjadi kesalahan jaringan atau server: ' + err.message, 'error');
        } finally {
          btn.innerText = originalText;
          btn.disabled = false;
        }
      });
    });
  </script>

  <!-- Registration Modal -->
  <div class="modal-overlay" id="registrationModal">
    <div class="modal-card" style="padding: 0; border: 1px solid var(--gray-200); background: var(--white); border-radius: 24px; box-shadow: none;">
      <button class="modal-close" onclick="closeRegistrationModal()" style="z-index: 10; top: 24px; right: 24px; color: var(--gray-700); background: var(--gray-100); border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;"><i data-lucide="x"></i></button>
      
      <div style="background: var(--primary-lighter); padding: 40px 32px 32px; position: relative; overflow: hidden;">
         <span style="background: var(--primary); padding: 6px 14px; border-radius: 50px; color: white; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; position: relative; z-index: 2;">Pendaftaran Tiket</span>
         <span id="reg_event_price_tag" style="display: none; margin-left: 8px; background: #16A34A; padding: 6px 14px; border-radius: 50px; color: white; font-size: 0.75rem; font-weight: 700; position: relative; z-index: 2;">Rp 0</span>
         <h3 style="color: var(--primary-dark); margin-top: 16px; font-size: 1.8rem; font-weight: 800; line-height: 1.2; position: relative; z-index: 2;" id="reg_event_name">Nama Event</h3>
      </div>
      
      <form id="registrationForm" style="padding: 32px; display: flex; flex-direction: column; gap: 20px;">
        <input type="hidden" id="reg_event_id" name="event_id">
        <div class="input-group" style="display: flex; flex-direction: column; gap: 8px;">
          <label style="font-size: 0.85rem; font-weight: 700; color: var(--gray-700);">Nama Lengkap</label>
          <input type="text" id="reg_nama" name="nama_lengkap" required style="width: 100%; padding: 14px 16px; border: 1px solid var(--gray-200); border-radius: 12px; background: var(--bg); font-size: 0.95rem; transition: all 0.3s; outline: none;" onfocus="this.style.borderColor='var(--primary)'; this.style.backgroundColor='#fff';" onblur="this.style.borderColor='var(--gray-200)'; this.style.backgroundColor='var(--bg)';">
        </div>
        <div class="input-group" style="display: flex; flex-direction: column; gap: 8px;">
          <label style="font-size: 0.85rem; font-weight: 700; color: var(--gray-700);">Email Aktif</label>
          <input type="email" id="reg_email" name="email" required style="width: 100%; padding: 14px 16px; border: 1px solid var(--gray-200); border-radius: 12px; background: var(--bg); font-size: 0.95rem; transition: all 0.3s; outline: none;" onfocus="this.style.borderColor='var(--primary)'; this.style.backgroundColor='#fff';" onblur="this.style.borderColor='var(--gray-200)'; this.style.backgroundColor='var(--bg)';">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="input-group" style="display: flex; flex-direction: column; gap: 8px;">
              <label style="font-size: 0.85rem; font-weight: 700; color: var(--gray-700);">No. WhatsApp</label>
              <input type="text" id="reg_wa" name="no_wa" required style="width: 100%; padding: 14px 16px; border: 1px solid var(--gray-200); border-radius: 12px; background: var(--bg); font-size: 0.95rem; transition: all 0.3s; outline: none;" onfocus="this.style.borderColor='var(--primary)'; this.style.backgroundColor='#fff';" onblur="this.style.borderColor='var(--gray-200)'; this.style.backgroundColor='var(--bg)';">
            </div>
            <div class="input-group" style="display: flex; flex-direction: column; gap: 8px;">
              <label style="font-size: 0.85rem; font-weight: 700; color: var(--gray-700);">Instansi / Fakultas</label>
              <input type="text" id="reg_instansi" name="instansi" required style="width: 100%; padding: 14px 16px; border: 1px solid var(--gray-200); border-radius: 12px; background: var(--bg); font-size: 0.95rem; transition: all 0.3s; outline: none;" onfocus="this.style.borderColor='var(--primary)'; this.style.backgroundColor='#fff';" onblur="this.style.borderColor='var(--gray-200)'; this.style.backgroundColor='var(--bg)';">
            </div>
        </div>
        
        <div id="infoRekening" style="display: none;"></div>
        
        <div id="buktiBayarGroup" class="input-group" style="display: none; flex-direction: column; gap: 8px;">
          <label style="font-size: 0.85rem; font-weight: 700; color: var(--gray-700);">Upload Bukti Pembayaran</label>
          <div style="padding: 16px; border: 2px dashed var(--gray-300); border-radius: 12px; text-align: center; background: var(--gray-50);">
            <input type="file" id="reg_bukti_bayar" name="bukti_bayar" accept="image/*" style="width: 100%; font-size: 0.9rem;">
            <p style="font-size: 0.8rem; color: var(--gray-400); margin-top: 8px;">Format didukung: JPG, PNG, WEBP (Max 2MB)</p>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="regSubmitBtn" style="margin-top: 12px; padding: 16px; font-size: 1.05rem; font-weight: 700; border-radius: 16px; box-shadow: none; display: flex; justify-content: center; align-items: center; gap: 10px;">
          Konfirmasi Pendaftaran <i data-lucide="check-circle"></i>
        </button>
      </form>
    </div>
  </div>

  <style>
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
      z-index: 9999; display: none; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.3s ease; padding: 24px; box-sizing: border-box;
    }
    .modal-overlay.show { opacity: 1; }
    .modal-card {
      background: white; border-radius: 24px; padding: 40px; width: 100%; max-width: 500px;
      position: relative; transform: translateY(20px); transition: transform 0.3s ease;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      max-height: 100%; overflow-y: auto;
    }
    .modal-overlay.show .modal-card { transform: translateY(0); }
    .modal-close {
      position: absolute; top: 24px; right: 24px; background: none; border: none; cursor: pointer; color: var(--gray-400);
    }
    .modal-close:hover { color: var(--gray-900); }
  </style>

</body>
</html>
