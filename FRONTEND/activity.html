<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventra | Activity</title>
  <link rel="icon" type="image/png" href="assets/icon.png">
  <link rel="stylesheet" href="css/styles.css?v=8">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <style>
    .tab-buttons {
      display: flex;
      gap: 16px;
      margin-bottom: 48px;
      border-bottom: 1px solid var(--gray-200);
      padding-bottom: 16px;
    }
    .tab-btn {
      background: transparent;
      border: none;
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--gray-400);
      cursor: pointer;
      padding: 8px 16px;
      position: relative;
      transition: color 0.3s;
    }
    .tab-btn:hover {
      color: var(--gray-700);
    }
    .tab-btn.active {
      color: var(--primary-dark);
    }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -17px;
      left: 0;
      width: 100%;
      height: 3px;
      background: var(--primary);
      border-radius: 4px;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .h-banner {
      width: 200px;
      flex-shrink: 0;
      background-size: cover;
      background-position: center;
      background-color: var(--gray-200);
    }
    @media (max-width: 768px) {
      .h-banner {
        width: 100%;
        height: 180px;
      }
      .tab-buttons {
        flex-direction: column;
        gap: 8px;
      }
      .tab-btn.active::after {
        display: none;
      }
    }
  </style>
</head>
<body>

  <div class="bg-mesh"></div>

  <header class="header-container">
  <div class="nav-brand-container">
    <a href="index.html" class="nav-brand">
      <img src="assets/logo%20eventra.png?v=2" alt="Eventra" style="width: 220px; height: auto; transform: translateY(4px); filter: brightness(0) invert(1); object-fit: contain;">
    </a>
  </div>

  <!-- Fluid Island Nav -->
  <nav class="fluid-nav">
    <div class="nav-links">
      <a href="search.html" class="nav-link">Discover</a>
      <a href="activity.html" class="nav-link active">Activity</a>
      <a href="calendar.html" class="nav-link">Calendar</a>
    </div>
  </nav>

  <div class="nav-profile-container">
    <a href="profile.html">
      <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&h=100&fit=crop" class="nav-avatar"
        alt="Profile">
    </a>
  </div>
  </header>

  <main class="container section" style="padding-top: 160px; max-width: 1000px;">
    
    <!-- Massive Editorial Header -->
    <header class="gsap-reveal" style="margin-bottom: 64px;">
      <span class="eyebrow">My Tickets & Events</span>
      <h1 style="font-size: clamp(3rem, 6vw, 5rem); margin-bottom: 32px;">Aktivitas<br>Anda.</h1>
    </header>

    <!-- Eventku -->
    <div id="eventku">
      
      <div id="eventku-container">
        <!-- Loader -->
        <div style="text-align: center; padding: 64px; color: var(--gray-400);">
          <i data-lucide="loader" class="icon-md" style="animation: spin 2s linear infinite;"></i>
          <p style="margin-top: 16px;">Memuat riwayat pendaftaran...</p>
        </div>
      </div>
      
      <style>
        @media (max-width: 768px) {
          .card-inner { flex-direction: column !important; }
          .card-inner > div:first-child { height: 200px; border-radius: 24px 24px 0 0 !important; }
          .card-inner > div:last-child { padding: 24px !important; }
        }
      </style>
    </div>



  </main>

  <!-- Certificate Modal -->
  <div id="certModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; padding: 24px; opacity: 0; transition: opacity 0.3s ease;">
    <div style="background: white; width: 100%; max-width: 800px; aspect-ratio: 1.414; border-radius: 16px; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 48px; box-shadow: 0 24px 48px rgba(0,0,0,0.2); overflow: hidden;">
      <!-- Elegant Background elements -->
      <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; border: 16px solid var(--primary); opacity: 0.1; pointer-events: none; margin: 16px; border-radius: 8px;"></div>
      <div style="position: absolute; top: 0; left: 0; width: 150px; height: 150px; background: var(--primary); opacity: 0.05; border-radius: 0 0 100% 0;"></div>
      <div style="position: absolute; bottom: 0; right: 0; width: 150px; height: 150px; background: var(--primary); opacity: 0.05; border-radius: 100% 0 0 0;"></div>
      
      <button onclick="closeCertificate()" style="position: absolute; top: 24px; right: 24px; background: rgba(0,0,0,0.05); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.3s; z-index: 10;">
        <i data-lucide="x" class="icon-sm"></i>
      </button>
      
      <h2 style="font-size: clamp(1.8rem, 4vw, 2.8rem); color: var(--primary-dark); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.1em; position: relative; z-index: 1;">Sertifikat Partisipasi</h2>
      <p style="color: var(--gray-700); font-size: 1.2rem; margin-bottom: 32px; position: relative; z-index: 1;">Diberikan dengan bangga kepada</p>
      
      <h1 id="certUserName" style="font-size: clamp(2.5rem, 6vw, 4rem); font-family: 'Georgia', serif; color: var(--gray-900); margin-bottom: 32px; font-weight: 400; border-bottom: 2px solid var(--primary); padding-bottom: 8px; width: 80%; display: inline-block; position: relative; z-index: 1;">Nama Peserta</h1>
      
      <p style="color: var(--gray-700); font-size: 1.2rem; margin-bottom: 16px; position: relative; z-index: 1;">atas partisipasinya dalam acara</p>
      <h3 id="certEventName" style="font-size: clamp(1.4rem, 3vw, 2rem); color: var(--primary); font-weight: 800; max-width: 80%; position: relative; z-index: 1;">Nama Event</h3>
      
      <div style="position: absolute; bottom: 40px; left: 48px; text-align: left;">
        <img src="assets/logo%20eventra.png" alt="Eventra" style="height: 30px; opacity: 0.5; filter: grayscale(1);">
      </div>
    </div>
  </div>

  <!-- Load API first for auth -->
  <script src="js/api.js?v=4"></script>
  <script src="js/gsap-animations.js?v=3"></script>
  <script>
    lucide.createIcons();
    window.api.updateNavbarAuth();

    function showCertificate(eventName, userName) {
      document.getElementById('certEventName').innerText = eventName;
      document.getElementById('certUserName').innerText = userName;
      const modal = document.getElementById('certModal');
      modal.style.display = 'flex';
      // Trigger reflow
      void modal.offsetWidth;
      modal.style.opacity = '1';
    }

    function closeCertificate() {
      const modal = document.getElementById('certModal');
      modal.style.opacity = '0';
      setTimeout(() => {
        modal.style.display = 'none';
      }, 300);
    }

    // Fetch and render registered events
    document.addEventListener("DOMContentLoaded", async () => {
      const container = document.getElementById('eventku-container');
      const userStr = localStorage.getItem('eventra_user');
      
      if (!userStr) {
        container.innerHTML = `
          <div class="doppelrand-card" style="text-align:center; padding: 64px;">
            <p style="font-size: 1.2rem; color: var(--gray-700);">Silakan login terlebih dahulu untuk melihat aktivitas Anda.</p>
            <button class="btn btn-primary" onclick="window.location.href='login.html'" style="margin-top: 16px;">Login Sekarang</button>
          </div>
        `;
        return;
      }

      const user = JSON.parse(userStr);
      const events = await window.api.fetchEventUser(user.user_id);

      if (events.length === 0) {
        container.innerHTML = `
          <div class="doppelrand-card" style="text-align:center; padding: 64px;">
            <p style="font-size: 1.2rem; color: var(--gray-700);">Anda belum mendaftar ke event manapun.</p>
            <button class="btn btn-primary" onclick="window.location.href='search.html'" style="margin-top: 16px;">Cari Event</button>
          </div>
        `;
        return;
      }

      let html = `<div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 32px; border-bottom: 1px solid var(--gray-200); padding-bottom: 16px;">
                    <h3 style="margin: 0; font-size: 2rem;">Pendaftaran Anda</h3>
                    <span style="font-weight: 800; color: var(--primary);">${events.length} Event Didaftar</span>
                  </div>`;

      events.forEach((event, index) => {
        const imageUrl = event.banner_img 
            ? `${window.api.BASE_URL}/uploads/${event.banner_img}` 
            : 'https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=600';

        const eventDate = new Date(event.tanggal);
        eventDate.setHours(23, 59, 59, 999);
        const now = new Date();
        const isFinished = now > eventDate;

        let statusHtml = '';
        let certBtnHtml = '';

        if (isFinished) {
          statusHtml = `<div style="background: rgba(59, 130, 246, 0.08); border: 1px solid rgba(59, 130, 246, 0.2); color: #3B82F6; padding: 16px 24px; border-radius: 16px; font-weight: 900; font-size: 1rem; margin-bottom: 32px; display: flex; align-items: center; gap: 12px; letter-spacing: 0.05em;">
            <i data-lucide="check-circle" class="icon-md"></i> STATUS: SELESAI
          </div>`;
          certBtnHtml = `<button onclick="showCertificate('${event.nama_event.replace(/'/g, "\\'")}', '${user.nama.replace(/'/g, "\\'")}')" class="btn btn-primary" style="padding: 16px 32px; font-size: 1.1rem; flex: 1; display: flex; align-items: center; justify-content: center; gap: 12px;">
            <i data-lucide="award" class="icon-md"></i> Lihat E-Certificate
          </button>`;
        } else {
          statusHtml = `<div style="background: rgba(22, 163, 74, 0.08); border: 1px solid rgba(22, 163, 74, 0.2); color: #16A34A; padding: 16px 24px; border-radius: 16px; font-weight: 900; font-size: 1rem; margin-bottom: 32px; display: flex; align-items: center; gap: 12px; letter-spacing: 0.05em;">
            <i data-lucide="calendar-clock" class="icon-md"></i> STATUS: TERDAFTAR
          </div>`;
          certBtnHtml = `<button class="btn" disabled style="padding: 16px 32px; font-size: 1.1rem; flex: 1; display: flex; align-items: center; justify-content: center; gap: 12px; background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; border: none;">
            <i data-lucide="lock" class="icon-md"></i> E-Certificate Belum Tersedia
          </button>`;
        }

        html += `
        <article class="doppelrand-card" style="margin-bottom: 32px;">
          <div class="card-inner" style="display: flex; flex-direction: row; padding: 0;">
            <div style="flex: 0 0 300px; background-image: url('${imageUrl}'); background-size: cover; background-position: center; border-radius: 24px 0 0 24px; position: relative;">
              <div style="position: absolute; top: 16px; left: 16px;">
                <span class="badge badge-primary" style="backdrop-filter: blur(8px); background: rgba(102, 45, 145, 0.9);">${event.kategori}</span>
              </div>
            </div>
            
            <div style="flex: 1; padding: 48px; display: flex; flex-direction: column;">
              <h3 style="font-size: clamp(1.5rem, 3vw, 2.2rem); margin-bottom: 16px; line-height: 1.1;">${event.nama_event}</h3>
              
              <div style="display: flex; gap: 32px; margin-bottom: 32px; flex-wrap: wrap;">
                <div style="display: flex; flex-direction: column; gap: 4px;">
                  <span style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gray-400); font-weight: 800;">Tanggal Event</span>
                  <span style="font-weight: 800; color: var(--gray-900); font-size: 1.1rem;"><i data-lucide="calendar" class="icon-sm" style="color: var(--primary); margin-right: 4px;"></i> ${window.api.formatTanggal(event.tanggal)}</span>
                </div>
                <div style="display: flex; flex-direction: column; gap: 4px;">
                  <span style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gray-400); font-weight: 800;">Lokasi</span>
                  <span style="font-weight: 800; color: var(--gray-900); font-size: 1.1rem;"><i data-lucide="map-pin" class="icon-sm" style="color: var(--primary); margin-right: 4px;"></i> ${event.lokasi}</span>
                </div>
              </div>
              
              ${statusHtml}

              <div style="display: flex; gap: 16px; margin-top: auto; flex-wrap: wrap;">
                ${certBtnHtml}
              </div>
            </div>
          </div>
        </article>`;
      });

      container.innerHTML = html;
      lucide.createIcons();
      
      if (typeof gsap !== 'undefined') {
        gsap.fromTo(container.children, 
          { y: 50, opacity: 0, filter: "blur(10px)" }, 
          { y: 0, opacity: 1, filter: "blur(0px)", duration: 1.2, stagger: 0.15, ease: "power3.out" }
        );
      }
      if(typeof ScrollTrigger !== 'undefined') ScrollTrigger.refresh();
    });
  </script>

  <!-- Page Transition Curtains -->
  <div class="curtain curtain-left"></div>
  <div class="curtain curtain-right"></div>
  <img src="assets/logo full.png" alt="Eventra Logo" class="curtain-logo">
</body>
</html>
