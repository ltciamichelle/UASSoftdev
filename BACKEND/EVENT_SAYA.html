<div class="content">
    <div class="hero-section">
        <div class="hero-title">
            <h1 id="welcomeUser">Event Saya</h1>
            <p>Kelola tiket digital dan lacak status keikutsertaan event kampus Anda.</p>
        </div>
        <span class="badge-upcoming"><i class="fa-solid fa-ticket"></i> <span id="totalTiket">0</span> Tiket
            Aktif</span>
    </div>

    <div class="tabs">
        <a href="EVENT.html" class="tab-item">Jelajahi Event Lain</a>
        <a href="EVENT_SAYA.html" class="tab-item active">Tiket Saya</a>
    </div>

    <div id="ticketContainer">
        <div style="text-align:center; padding: 40px; color:#64748b;">Memuat riwayat tiket...</div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const userData = localStorage.getItem('user_eventra');
        if (!userData) {
            alert("Silakan login terlebih dahulu untuk mengakses menu Event Saya.");
            window.location.href = 'Login.html';
            return;
        }

        const user = JSON.parse(userData);
        document.getElementById('welcomeUser').innerText = `Tiket ${user.nama || user.username}`;

        // Ambil data event dari pendaftaran yang dilakukan user tersebut
        muatTiketEventSaya(user.id);
    });

    function muatTiketEventSaya(userId) {
        const ticketContainer = document.getElementById('ticketContainer');

        fetch(`buat_event.php?aksi=ambil_event_saya&user_id=${userId}`)
            .then(response => response.json())
            .then(data => {
                if (!data || data.length === 0 || data.status === 'error') {
                    document.getElementById('totalTiket').innerText = '0';
                    ticketContainer.innerHTML = `
                        <div style="text-align: center; padding: 60px 20px; background: #f8fafc; border-radius:16px; border: 2px dashed #e2e8f0;">
                            <i class="fa-solid fa-receipt" style="font-size: 3rem; color: #cbd5e1; margin-bottom:15px;"></i>
                            <h3 style="color:#334155;">Belum Ada Tiket</h3>
                            <p style="color:#64748b; font-size:14px; margin-top:5px;">Anda belum mendaftar ke event kampus manapun.</p>
                        </div>`;
                    return;
                }

                // Update total jumlah tiket aktif di badge atas
                document.getElementById('totalTiket').innerText = data.length;
                ticketContainer.innerHTML = '';

                // Loop data hasil pendaftaran untuk dirender menjadi layout tiket horizontal
                data.forEach(item => {
                    const posterSrc = item.banner_img ? `uploads/${item.banner_img}` : 'https://images.unsplash.com/photo-1501281668745-f7f57925c3b4?w=500';

                    const ticketHtml = `
                        <div class="ticket-card">
                            <div class="ticket-img-wrapper">
                                <img src="${posterSrc}" alt="Poster ${item.nama_event}">
                                <div class="live-badge"><i class="fa-solid fa-circle-check"></i> ${item.status_pendaftaran}</div>
                            </div>
                            <div class="ticket-details">
                                <div class="ticket-header">
                                    <div>
                                        <h3 class="ticket-title">${item.nama_event}</h3>
                                        <div class="ticket-meta"><i class="fa-solid fa-location-dot"></i> ${item.lokasi}</div>
                                        <div class="ticket-meta"><i class="fa-solid fa-calendar"></i> ${formatTanggal(item.tanggal)}</div>
                                        <div class="ticket-meta"><i class="fa-solid fa-clock"></i> ${item.waktu} WIB</div>
                                    </div>
                                    <div class="qr-icon-box">
                                        <i class="fa-solid fa-qrcode style="font-size: 24px;"></i>
                                    </div>
                                </div>
                                <div class="ticket-info-grid">
                                    <div class="info-item">
                                        <span class="info-label">Kategori</span>
                                        <span class="info-value">${item.kategori}</span>
                                    </div>
                                    <div class="info-item">
                                        <span class="info-label">Jenis Tiket</span>
                                        <span class="info-value">${item.tipe_tiket.toUpperCase()}</span>
                                    </div>
                                </div>
                                <div class="ticket-footer">
                                    <span class="order-id">Pendaftaran ID: #EVT-${item.pendaftaran_id}</span>
                                    <button class="btn-qr" onclick="alert('Gunakan QR Code ini saat absensi kehadiran di lokasi event.')">
                                        <i class="fa-solid fa-expand"></i> Lihat QR Tiket
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                    ticketContainer.innerHTML += ticketHtml;
                });
            })
            .catch(error => {
                console.error("Error fetching my events:", error);
                ticketContainer.innerHTML = `<div style="text-align:center; color:red; padding:20px;">Gagal memuat tiket dari database.</div>`;
            });
    }

    function formatTanggal(stringTanggal) {
        const opsi = { year: 'numeric', month: 'long', day: 'numeric' };
        return new Date(stringTanggal).toLocaleDateString('id-ID', opsi);
    }
</script>
