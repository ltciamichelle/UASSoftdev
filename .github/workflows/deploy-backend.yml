name: Deploy Full Stack to InfinityFree via FTP

on:
  push:
    branches:
      - main
    paths:
      - 'BACKEND/**' # Action berjalan jika ada file BACKEND yang berubah
      - 'FRONTEND/**' # Action berjalan jika ada file FRONTEND yang berubah

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
      
    - name: Sync BACKEND files via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./BACKEND/
        server-dir: /htdocs/
        exclude: |
          **/.git*
          **/.git*/**

    - name: Sync FRONTEND files via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./FRONTEND/
        server-dir: /htdocs/
        exclude: |
          **/.git*
          **/.git*/**
