name: Deploy Backend to InfinityFree via FTP

on:
  push:
    branches:
      - main
    paths:
      - 'BACKEND/**' # Action hanya berjalan jika ada file di dalam folder BACKEND yang berubah

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
      
    - name: Sync files via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./BACKEND/
        server-dir: /htdocs/
        exclude: |
          **/.git*
          **/.git*/**
