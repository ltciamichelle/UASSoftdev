<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventra | Discover</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <style>
    .search-input-wrapper {
      position: relative;
      margin-bottom: 48px;
    }
    .search-input {
      width: 100%;
      padding: 24px 24px 24px 72px;
      font-size: 1.5rem;
      font-weight: 800;
      border-radius: 2rem;
      border: 1px solid var(--gray-200);
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(16px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.05);
      transition: all 0.4s var(--ease-spring);
    }
    .search-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 20px 40px rgba(255, 141, 40, 0.15);
      background: #fff;
    }
    .search-icon {
      position: absolute;
      left: 28px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--primary);
    }
    .filter-group {
      margin-bottom: 24px;
    }
    .filter-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      color: var(--gray-700);
      cursor: pointer;
      font-weight: 600;
      transition: color 0.2s;
    }
    .filter-option:hover {
      color: var(--primary);
    }
    .filter-option input {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }
    
    /* Layout Upgrades */
    .editorial-split {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 120px;
      align-items: flex-start;
    }
    .editorial-list {
      display: flex;
      flex-direction: column;
      gap: 32px; /* Clean spacing, no negative margins */
    }
    .list-card {
      transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1), box-shadow 0.4s;
    }
    .list-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    }
    @media (max-width: 900px) {
      .editorial-split { grid-template-columns: 1fr; gap: 32px; }
      .list-card:hover { transform: translateY(-4px); }
    }
  </style>
</head>
<body>

  <div class="bg-mesh"></div>

  <!-- Fluid Island Nav -->
  <nav class="fluid-nav">
    <a href="index.html" class="nav-brand">
      <img src="assets/logo%20eventra.png" alt="Eventra" style="height: 72px; width: auto; object-fit: contain;">
    </a>
    <div class="nav-links">
      <a href="search.html" class="nav-link active">Discover</a>
      <a href="activity.html" class="nav-link">Activity</a>
      <a href="#calendar" class="nav-link">Calendar</a>
    </div>
    <a href="profile.html">
      <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&h=100&fit=crop" class="nav-avatar" alt="Profile">
    </a>
  </nav>

  <main class="container section" style="padding-top: 160px;">
    
    <div class="search-input-wrapper gsap-reveal">
      <i data-lucide="search" class="search-icon icon-md"></i>
      <input type="text" class="search-input" placeholder="Cari event, topik, atau penyelenggara...">
    </div>

    <div class="editorial-split">
      
      <!-- Left: Massive Sticky Typography & Filters -->
      <aside style="position: sticky; top: 120px;" class="gsap-reveal">
        <span class="eyebrow">Explore Directory</span>
        <h1 style="margin-bottom: 48px; font-size: clamp(3.5rem, 6vw, 6rem);">Temukan<br>Event<br>Terbaik.</h1>
        
        <div class="doppelrand-card">
          <div class="card-inner" style="padding: 32px;">
            <div class="filter-group">
              <h4 style="margin-bottom: 16px;">Kategori</h4>
              <label class="filter-option"><input type="checkbox" checked> Semua</label>
              <label class="filter-option"><input type="checkbox"> Seminar</label>
              <label class="filter-option"><input type="checkbox"> Workshop</label>
              <label class="filter-option"><input type="checkbox"> Lomba</label>
            </div>
            
            <div class="filter-group">
              <h4 style="margin-bottom: 16px;">Biaya</h4>
              <label class="filter-option"><input type="radio" name="fee" checked> Semua</label>
              <label class="filter-option"><input type="radio" name="fee"> Gratis</label>
              <label class="filter-option"><input type="radio" name="fee"> Berbayar</label>
            </div>
          </div>
        </div>
      </aside>

      <!-- Right: Editorial List Results -->
      <div class="editorial-list">
        
        <!-- List Card 1 -->
        <article class="doppelrand-card list-card gsap-reveal">
          <div class="card-inner">
            <div style="height: 240px; background: url('https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=600') center/cover;"></div>
            <div style="padding: 32px; flex: 1; display: flex; flex-direction: column;">
              <h3 style="margin-bottom: 8px;">Tech Leadership Summit</h3>
              <p style="font-size: 1rem; color: var(--gray-400); margin-bottom: 24px; display: flex; align-items: center; gap: 8px;">
                <i data-lucide="calendar" class="icon-sm"></i> 14 Jun 2025
              </p>
              <div style="margin-top: auto; display: flex; justify-content: space-between; align-items: center;">
                <span class="badge badge-primary">Seminar</span>
                <span style="font-weight: 900; color: var(--primary-dark); font-size: 1.2rem;">Gratis</span>
              </div>
            </div>
          </div>
        </article>

        <!-- List Card 2 -->
        <article class="doppelrand-card list-card gsap-reveal">
          <div class="card-inner">
            <div style="height: 240px; background: url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d?w=600') center/cover;"></div>
            <div style="padding: 32px; flex: 1; display: flex; flex-direction: column;">
              <h3 style="margin-bottom: 8px;">National Hackathon 4.0</h3>
              <p style="font-size: 1rem; color: var(--gray-400); margin-bottom: 24px; display: flex; align-items: center; gap: 8px;">
                <i data-lucide="calendar" class="icon-sm"></i> 20 Jul 2025
              </p>
              <div style="margin-top: auto; display: flex; justify-content: space-between; align-items: center;">
                <span class="badge badge-primary">Lomba</span>
                <span class="badge badge-red live-pulse">Closing Soon</span>
              </div>
            </div>
          </div>
        </article>

        <!-- List Card 3 -->
        <article class="doppelrand-card list-card gsap-reveal" style="margin-bottom: 0;">
          <div class="card-inner">
            <div style="height: 240px; background: url('https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?w=600') center/cover;"></div>
            <div style="padding: 32px; flex: 1; display: flex; flex-direction: column;">
              <h3 style="margin-bottom: 8px;">Acoustic Night & Art Expo</h3>
              <p style="font-size: 1rem; color: var(--gray-400); margin-bottom: 24px; display: flex; align-items: center; gap: 8px;">
                <i data-lucide="calendar" class="icon-sm"></i> Hari Ini
              </p>
              <div style="margin-top: auto; display: flex; justify-content: space-between; align-items: center;">
                <span class="badge badge-primary">Konser</span>
                <span style="font-weight: 900; color: var(--gray-900); font-size: 1.2rem;">Rp 50.000</span>
              </div>
            </div>
          </div>
        </article>

      </div>
    </div>
    
    <!-- Pagination / Load More -->
    <div class="gsap-reveal" style="text-align: center; margin-top: 64px;">
      <button class="btn btn-ghost magnetic">Muat Lebih Banyak <i data-lucide="chevron-down" class="icon-sm" style="margin-left: 8px;"></i></button>
    </div>

  </main>

  <script src="gsap-animations.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
